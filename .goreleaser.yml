version: 2  # ← Add this at the very top

project_name: mosquitto_exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: mosquitto_exporter
    main: .
    binary: mosquitto_exporter
    env:
      - CGO_ENABLED=0
    flags:
      - -buildvcs=false
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

archives:
  - formats: [tar.gz]  # ← was `format: tar.gz`
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]  # ← was `format: zip`
    files:
      - LICENSE
      - README.md

dockers_v2:
  - dockerfile: Dockerfile
    ids:
      - mosquitto_exporter
    images:
      - "ghcr.io/{{ .Env.IMAGE_NAME }}"
      - "docker.io/{{ .Env.DOCKERHUB_USERNAME }}/mosquitto_exporter"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .Commit }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
