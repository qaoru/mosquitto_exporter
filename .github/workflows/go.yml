# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Run unit tests
      run: go test -v ./...

    - name: Run unit tests with coverage
      run: go test ./... -coverprofile=coverage.out -covermode=atomic

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Check for common issues
      run: |
        echo "Checking for common Go issues..."
        go vet ./...
        golangci-lint run ./... || echo "golangci-lint not installed, skipping"

  integration-test:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Install Docker
      run: |
        sudo apt-get update
        sudo apt-get install -y docker.io
        sudo systemctl start docker
        sudo systemctl enable docker

    - name: Run Docker-based integration tests
      run: |
        echo "Running Docker-based integration tests..."
        go test -v -tags=integration -run TestIntegrationWithMosquitto -timeout 300s

    - name: Run basic integration verification
      run: |
        echo "Running basic integration verification..."
        # Start Mosquitto in Docker
        docker run -d -p 1883:1883 --name test-mosquitto eclipse-mosquitto:2.0.15
        
        # Wait for it to be ready
        echo "Waiting for Mosquitto to be ready..."
        for i in {1..30}; do
          if docker exec test-mosquitto mosquitto_sub -t '$SYS/broker/version' -C 1 >/dev/null 2>&1; then
            echo "Mosquitto is ready!"
            break
          fi
          sleep 1
          echo "Waiting... ($i/30)"
        done
        
        # Start the exporter in the background
        go run . --mqtt.broker=tcp://localhost:1883 --collector.clients --collector.messages --collector.load &
        EXPORTER_PID=$!
        
        # Give it time to start and connect
        sleep 5
        
        # Test that metrics are being served
        curl -s http://localhost:9344/metrics | grep "mosquitto_" && echo "Metrics found!" || exit 1
        
        # Clean up
        kill $EXPORTER_PID || true
        docker stop test-mosquitto
        docker rm test-mosquitto
        
        echo "Integration tests passed!"

  build:
    name: Build and Verify
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Build with race detector
      run: go build -race -v ./...

    - name: Verify no unused dependencies
      run: go mod tidy && git diff --exit-code go.mod go.sum || (echo "Unused dependencies found" && exit 1)
