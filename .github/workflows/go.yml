# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Run unit tests
      run: go test -v ./...

    - name: Run unit tests with coverage
      run: go test ./... -coverprofile=coverage.out -covermode=atomic

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage.out
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

    - name: Check for common issues
      run: |
        echo "Checking for common Go issues..."
        go vet ./...
        golangci-lint run ./... || echo "golangci-lint not installed, skipping"

  integration-test:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Install mosquitto
      run: sudo apt-get update && sudo apt-get install -y mosquitto mosquitto-clients netcat-openbsd

    - name: Start Mosquitto with no-auth config
      run: |
        # Start Mosquitto service
        sudo systemctl start mosquitto
        
        # Wait for Mosquitto to be ready
        echo "Waiting for Mosquitto to be ready..."
        for i in {1..30}; do
          if nc -z localhost 1883; then
            echo "Mosquitto is ready!"
            break
          fi
          sleep 1
          if [ $((i % 5)) -eq 0 ]; then
            echo "Waiting for Mosquitto... ($i/30)"
          fi
        done
        nc -z localhost 1883 || exit 1
        
        # Test that Mosquitto is accepting connections
        echo "Testing Mosquitto connection..."
        if timeout 10 mosquitto_sub -t '$SYS/broker/version' -C 1 -h localhost -p 1883 >/dev/null 2>&1; then
            echo "✓ Mosquitto is ready and accepting connections"
        else
            echo "⚠ Mosquitto connection test failed, but port is open"
        fi

    - name: Test exporter with real Mosquitto
      run: |
        echo "Testing exporter with real Mosquitto broker..."
        
        # Start the exporter in the background with retry logic
        echo "Starting exporter..."
        for i in {1..3}; do
            go run . --mqtt.broker=tcp://localhost:1883 --collector.clients --collector.messages --collector.load &
            EXPORTER_PID=$!
            
            # Give it time to start and connect
            sleep 10
            
            # Test if metrics are being served
            if curl -s http://localhost:9344/metrics | grep -q "mosquitto_"; then
                echo "✓ Exporter started successfully"
                break
            else
                echo "✗ Exporter failed to start, retrying ($i/3)..."
                kill $EXPORTER_PID || true
                sleep 3
                if [ $i -eq 3 ]; then
                    echo "✗ Exporter failed to start after 3 attempts"
                    exit 1
                fi
            fi
        done
        
        # Test that metrics are being served
        echo "Verifying metrics..."
        for i in {1..5}; do
            METRICS=$(curl -s http://localhost:9344/metrics || echo "")
            if [ -z "$METRICS" ]; then
                echo "✗ No metrics received, retrying ($i/5)..."
                sleep 3
                continue
            fi
            
            echo "Metrics received (first 15 lines):"
            echo "$METRICS" | head -15
            
            # Verify we get Mosquitto metrics
            if echo "$METRICS" | grep -q "mosquitto_"; then
                echo "✓ Mosquitto metrics found!"
                break
            else
                echo "✗ Mosquitto metrics not found, retrying ($i/5)..."
                sleep 3
                if [ $i -eq 5 ]; then
                    echo "✗ Mosquitto metrics not found after 5 attempts"
                    exit 1
                fi
            fi
        done
        
        # Verify we get specific metrics
        echo "Verifying specific metrics..."
        if echo "$METRICS" | grep -q "mosquitto_uptime"; then
            echo "✓ Uptime metrics found!"
        else
            echo "✗ Uptime metrics not found"
            exit 1
        fi
        
        # Clean up
        echo "Cleaning up..."
        kill $EXPORTER_PID || true
        sleep 2
        
        echo "✅ Integration tests passed!"

    - name: Stop Mosquitto
      if: always()
      run: sudo systemctl stop mosquitto || true

  build:
    name: Build and Verify
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Build with race detector
      run: go build -race -v ./...

    - name: Verify no unused dependencies
      run: go mod tidy && git diff --exit-code go.mod go.sum || (echo "Unused dependencies found" && exit 1)
